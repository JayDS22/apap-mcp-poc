# Test-only Postgres instance for integration tests.
# Usage: docker compose -f docker-compose.test.yml up -d
# This gives tests a real Postgres to run against without
# interfering with the development database.

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: apap_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10
    # tmpfs for speed. Test data is ephemeral anyway.
    tmpfs:
      - /var/lib/postgresql/data
