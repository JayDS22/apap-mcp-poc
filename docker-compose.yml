# docker compose up -- Postgres + server, ready in ~30 seconds.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1baddeed
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10

  server:
    build: .
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 9000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1baddeed
      POSTGRES_DATABASE: postgres
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
